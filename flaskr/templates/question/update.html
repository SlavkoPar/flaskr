{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit "{{ question['name'] }}"{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="name">Name</label>
    <input name="name" id="name" value="{{ request.form['name'] or question['name'] }}" required>
    <label for="link">Link</label>
    <textarea name="link" id="link">{{ request.form['link'] or question['link'] }}</textarea>
    <input type="submit" value="Save">
  </form>
  <hr>
  <form action="{{ url_for('question.delete', id=question['id']) }}" method="post">
    <input class="danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
  </form>
{% endblock %}
