{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit "{{ question['text'] }}"{% endblock %}</h1>
  {{ question['category_id'] }}
{% endblock %}

{% block content %}
  <form method="post">
    <label for="text">Name</label>
    <input name="text" id="text" value="{{ request.form['text'] or question['text'] }}" required>
    <label for="link">Link</label>
    <textarea name="link" id="link">{{ request.form['link'] or question['link'] }}</textarea>
    <input type="submit" value="Update">
  </form>
  <hr>
  <form action="{{ url_for('question.delete', id=question['id']) }}" method="post">
    <input class="danger" type="submit" value="Delete" onclick="return confirm('Are you sure?');">
  </form>
{% endblock %}
